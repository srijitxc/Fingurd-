# FinGuard Configuration File
# Modify these values to tune fraud detection thresholds

# Amount (in INR) above which a DEBIT is considered "high-value"
HIGH_VALUE_THRESHOLD=50000

# Total DEBIT spend in 10-minute window that triggers Spending Spike alert
SPENDING_SPIKE_LIMIT=200000

# Main rolling window duration (minutes) — patterns 1, 3, 4
WINDOW_MINUTES=10

# Short window for location anomaly detection (minutes) — pattern 2
CITY_WINDOW_MINUTES=5

# Max distinct devices before Device Switching alert triggers
MAX_DEVICE_SWITCHES=5

# Max high-value transactions before High-Value alert triggers
MAX_HIGH_VALUE_TXN=3

# Minimum seconds between successive alerts for the same account (duplicate suppression)
ALERT_SUPPRESSION_SECONDS=60
